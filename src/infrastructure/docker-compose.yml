services:
  backend:
    build:
      context: ../..
      dockerfile: src/infrastructure/backend/Dockerfile
    environment:
      - Jwt__Key=${JWT_SECRET}
    networks:
      - doko-net
    restart: unless-stopped

  caddy:
    build:
      context: ../..
      dockerfile: src/infrastructure/caddy/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
    depends_on:
      - backend
    networks:
      - doko-net
    restart: unless-stopped

volumes:
  caddy_data:

networks:
  doko-net:
    name: doko-net
