name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Rebuild production backend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            docker compose -f Code/infrastructure/docker-compose.yml \
              --env-file Code/infrastructure/.env \
              up --build -d --no-deps backend
            docker exec caddy caddy reload --config /etc/caddy/Caddyfile

      - name: Build frontend
        run: |
          cd Code/frontend
          npm ci
          npm run build

      - name: Upload frontend to production
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "Code/frontend/dist/"
          target: ${{ secrets.DEPLOY_FRONTEND_PATH }}
          strip_components: 3
