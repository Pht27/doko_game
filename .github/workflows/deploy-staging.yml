name: Deploy Staging

on:
  push:
    branches: [ develop ]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Rebuild staging backend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_STAGING_PATH }}
            git fetch origin develop
            git reset --hard origin/develop
            docker compose -f Code/infrastructure/docker-compose.yml \
              --env-file Code/infrastructure/.env \
              up --build -d --no-deps backend-staging

      - name: Build frontend
        run: |
          cd Code/frontend
          npm ci
          npm run build -- --mode staging

      - name: Upload frontend to staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "Code/frontend/dist/"
          target: ${{ secrets.DEPLOY_STAGING_FRONTEND_PATH }}
          strip_components: 3
